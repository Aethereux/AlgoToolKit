name: Build Releases

on:
  push:
    branches: [ "main", "master" ]
  pull_request:
    branches: [ "main", "master" ]
  workflow_dispatch:

jobs:
  build:
    name: Build on ${{ matrix.os }}
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        include:
          - os: ubuntu-latest
            artifact_name: AlgoToolkit-Linux
            executable_name: AlgoToolkit
          - os: macos-latest
            artifact_name: AlgoToolkit-macOS
            executable_name: AlgoToolkit
          - os: windows-latest
            artifact_name: AlgoToolkit-Windows.zip
            executable_name: AlgoToolkit.exe

    steps:
    - uses: actions/checkout@v4

    - name: Install Linux Dependencies
      if: runner.os == 'Linux'
      run: sudo apt-get update && sudo apt-get install -y xorg-dev libwayland-dev libxkbcommon-dev wayland-protocols libgl1-mesa-dev libxrandr-dev libxi-dev

    - name: Configure CMake
      run: cmake -B ${{github.workspace}}/build -DCMAKE_BUILD_TYPE=Release

    - name: Build
      run: cmake --build ${{github.workspace}}/build --config Release -j 4

    - name: Prepare Windows Artifact
      if: runner.os == 'Windows'
      run: |
        mkdir release_package
        copy build\Release\AlgoToolkit.exe release_package\
        powershell Compress-Archive -Path release_package\* -DestinationPath AlgoToolkit-Windows.zip

    - name: Upload Windows Artifact
      if: runner.os == 'Windows'
      uses: actions/upload-artifact@v4
      with:
        name: AlgoToolkit-Windows
        path: AlgoToolkit-Windows.zip

    - name: Upload Unix Artifacts
      if: runner.os != 'Windows'
      uses: actions/upload-artifact@v4
      with:
        name: ${{ matrix.artifact_name }}
        path: ${{github.workspace}}/build/${{ matrix.executable_name }}
